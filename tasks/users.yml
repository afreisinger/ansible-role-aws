---
- name: Ensure user groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ aws_users | map(attribute='groups') | flatten | unique | reject('equalto', 'sudo') | list }}"
  when: aws_users | length > 0

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | password_hash('sha512', (item.name | hash('sha256'))[:16]) }}"
    groups: "{{ item.groups + (['sudo'] if item.sudo | default(false) else []) }}"
    append: true
    shell: /bin/bash
    state: present
  loop: "{{ aws_users }}"
  when: aws_users | length > 0
  no_log: true

- name: Fetch SSH public keys from GitHub
  ansible.builtin.uri:
    url: "https://github.com/{{ item.github_user }}.keys"
    return_content: true
    status_code: [200, 404]
  register: aws_github_keys
  loop: "{{ aws_users }}"
  when:
    - aws_users | length > 0
    - item.github_user is defined
  delegate_to: localhost
  failed_when: false

- name: Warn when GitHub keys fetch failed
  ansible.builtin.debug:
    msg: "Could not fetch SSH keys for {{ item.item.github_user }}: {{ item.msg | default('HTTP ' + (item.status | default(-1) | string)) }}"
  loop: "{{ aws_github_keys.results }}"
  when:
    - item is not skipped
    - item.failed | default(false) or item.status | default(0) != 200

- name: Add SSH public keys from GitHub
  ansible.posix.authorized_key:
    user: "{{ item.item.name }}"
    key: "{{ item.content }}"
    state: present
  loop: "{{ aws_github_keys.results }}"
  when:
    - item is not skipped
    - not (item.failed | default(false))
    - item.status | default(0) == 200
    - item.content | trim | length > 0

- name: Set root password
  ansible.builtin.user:
    name: root
    password: "{{ aws_root_password | password_hash('sha512', ('root' | hash('sha256'))[:16]) }}"
  when: aws_root_password | length > 0
  no_log: true
