---
- name: Install extra packages
  ansible.builtin.apt:
    name: "{{ aws_packages }}"
    state: present
    update_cache: true
  when: aws_packages | length > 0

- name: Install gh CLI apt key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  when: aws_gh_enabled | bool

- name: Add gh CLI apt repository
  ansible.builtin.deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages
    suites: stable
    components: main
    architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
    signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
    install_python_debian: true
    state: present
  when: aws_gh_enabled | bool

- name: Install gh CLI
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  when: aws_gh_enabled | bool
