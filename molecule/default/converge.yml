---
- name: Converge
  hosts: all
  become: true

  vars:
    aws_hostname: "molecule-test"
    aws_root_password: "molecule_root_pass"
    aws_ufw_enabled: true
    aws_gh_enabled: true
    aws_users:
      - name: claude
        password: "molecule_pass"
        groups:
          - users
        sudo: false
        github_user: afreisinger

  pre_tasks:
    - name: Update apt cache.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Wait for systemd to complete initialization. # noqa command-instead-of-module
      ansible.builtin.command: systemctl is-system-running
      register: systemctl_status
      until: >
        'running' in systemctl_status.stdout or
        'degraded' in systemctl_status.stdout
      retries: 30
      delay: 5
      when: ansible_facts['service_mgr'] == 'systemd'
      changed_when: false
      failed_when: systemctl_status.rc > 1

  roles:
    - role: "afreisinger.aws"
