---
dependency:
  name: galaxy
  options:
    ignore-errors: true

driver:
  name: docker
  log_warnings: false

platforms:
  - name: instance
    image: "afreisinger/docker-${MOLECULE_DISTRO:-ubuntu2404-aws}-ansible"
    command: ${MOLECULE_DOCKER_COMMAND:-""}

    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"

    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    docker_network_mode: host

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATH: "../../.ansible/collections"
  options:
    diff: true
    v: true
  inventory:
    hosts:
      all:
        vars:
          ansible_user: ubuntu
  playbooks:
    prepare: "${MOLECULE_PLAYBOOK:-prepare.yml}"
    converge: "${MOLECULE_PLAYBOOK:-converge.yml}"
    verify: "${MOLECULE_PLAYBOOK:-verify.yml}"
    cleanup: "${MOLECULE_PLAYBOOK:-cleanup.yml}"

verifier:
  name: ansible
  options:
    v: true

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
