---
- name: Verify
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Assert hostname is set
      ansible.builtin.assert:
        that: ansible_facts['hostname'] == 'molecule-test'
        fail_msg: "Hostname is not molecule-test (got: {{ ansible_facts['hostname'] }})"

    - name: Assert cloud-init preserve_hostname is set
      ansible.builtin.stat:
        path: /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
      register: preserve_hostname_cfg

    - name: Assert preserve_hostname file exists
      ansible.builtin.assert:
        that: preserve_hostname_cfg.stat.exists
        fail_msg: "cloud-init preserve_hostname config not found"

    - name: Check user claude exists
      ansible.builtin.getent:
        database: passwd
        key: claude

    - name: Get claude group membership
      ansible.builtin.command: id -nG claude
      register: claude_groups
      changed_when: false

    - name: Assert claude is in users group
      ansible.builtin.assert:
        that: "'users' in claude_groups.stdout.split()"
        fail_msg: "User claude is not in users group"

    - name: Check claude has authorized keys
      ansible.builtin.stat:
        path: /home/claude/.ssh/authorized_keys
      register: auth_keys

    - name: Assert authorized_keys exists
      ansible.builtin.assert:
        that: auth_keys.stat.exists
        fail_msg: "authorized_keys not found for claude"

    - name: Get effective sshd configuration
      ansible.builtin.command: sshd -T
      register: sshd_effective
      changed_when: false

    - name: Assert PermitRootLogin is no
      ansible.builtin.assert:
        that: "'permitrootlogin no' in sshd_effective.stdout"
        fail_msg: "PermitRootLogin is not set to no"

    - name: Assert PasswordAuthentication is no
      ansible.builtin.assert:
        that: "'passwordauthentication no' in sshd_effective.stdout"
        fail_msg: "PasswordAuthentication is not set to no"

    - name: Assert PubkeyAuthentication is yes
      ansible.builtin.assert:
        that: "'pubkeyauthentication yes' in sshd_effective.stdout"
        fail_msg: "PubkeyAuthentication is not set to yes"

    - name: Check UFW status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Assert UFW is active
      ansible.builtin.assert:
        that: "'Status: active' in ufw_status.stdout"
        fail_msg: "UFW is not active"

    - name: Check tmux is installed
      ansible.builtin.command: which tmux
      register: tmux_check
      changed_when: false

    - name: Assert tmux is installed
      ansible.builtin.assert:
        that: tmux_check.rc == 0
        fail_msg: "tmux is not installed"

    - name: Check gh is installed
      ansible.builtin.command: which gh
      register: gh_check
      changed_when: false

    - name: Assert gh is installed
      ansible.builtin.assert:
        that: gh_check.rc == 0
        fail_msg: "gh CLI is not installed"
